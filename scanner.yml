name: Volume Scanner

on:
  schedule:
    # Run at 3:55 AM PST (11:55 AM UTC) - before market opens
    # Runs Monday-Friday during trading week
    - cron: '55 11 * * 1-5'
  
  # Allow manual trigger from GitHub
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run Volume Scanner
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python volume_scanner.py --github-mode
      
      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: scanner-logs
          path: volume_scanner.log
          retention-days: 30
      
      - name: Commit logs back to repo
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Create logs folder if it doesn't exist
          mkdir -p logs
          
          # Copy today's log with timestamp
          if [ -f volume_scanner.log ]; then
            cp volume_scanner.log logs/scanner_$(date +%Y-%m-%d).log
            git add logs/
            git commit -m "Add scan logs for $(date +%Y-%m-%d)" || echo "No changes to commit"
            git push
          fi
