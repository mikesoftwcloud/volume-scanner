name: Volume Scanner

on:
  schedule:
    - cron: '55 11 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - run: pip install -r requirements.txt
      
      - env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python volume_scanner.py > volume_scanner.log 2>&1 || true
      
      - run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          mkdir -p logs
          cp volume_scanner.log logs/scanner_$(date +%Y-%m-%d).log
          git add logs/
          git commit -m "Add scan logs for $(date +%Y-%m-%d)" || true
          git push || true
